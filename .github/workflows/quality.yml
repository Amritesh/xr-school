name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify contracts, runtime, and web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run strict verification
        run: npm run verify

      - name: Verify generated sources are current
        run: |
          git diff --exit-code -- \
            generated/openapi/openapi.json \
            apps/web/lib/scienceCatalog.generated.ts \
            apps/web/lib/curriculumSearch.generated.ts

  drift-check:
    name: Spec Drift Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Get changed files
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)
          echo "Changed files:"
          echo "$CHANGED"
          echo "CHANGED_FILES<<EOF" >> "$GITHUB_ENV"
          echo "$CHANGED" >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"

      - name: Run spec drift check
        run: npm run spec:drift
        env:
          CHANGED_FILES: ${{ env.CHANGED_FILES }}
