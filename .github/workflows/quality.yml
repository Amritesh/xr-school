name: Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  contract:
    name: TypeSpec Contract
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Compile TypeSpec contract
        run: npm run contract:compile

      - name: Verify OpenAPI was generated
        run: |
          if [ ! -f generated/openapi/openapi.json ]; then
            echo "ERROR: generated/openapi/openapi.json was not created"
            exit 1
          fi
          echo "OpenAPI spec generated successfully"
          node -e "const f = require('./generated/openapi/openapi.json'); console.log('OpenAPI version:', f.openapi); console.log('API title:', f.info.title)"

      - name: Upload OpenAPI artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-spec
          path: generated/openapi/openapi.json
          retention-days: 30

  test:
    name: Tests
    runs-on: ubuntu-latest
    needs: contract
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            coverage/
            test-results/
          retention-days: 7

  drift-check:
    name: Spec Drift Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | tr '\n' '\n')
          echo "Changed files:"
          echo "$CHANGED"
          echo "CHANGED_FILES<<EOF" >> $GITHUB_ENV
          echo "$CHANGED" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Run spec drift check
        run: npm run spec:drift
        env:
          CHANGED_FILES: ${{ env.CHANGED_FILES }}

  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit
        continue-on-error: true  # Remove once tsconfig is set up

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npx eslint . --ext .ts,.tsx --max-warnings 0
        continue-on-error: true  # Remove once eslint is configured

      - name: Prettier check
        run: npx prettier --check "**/*.{ts,tsx,json,md,yaml}"
        continue-on-error: true  # Remove once prettier is configured

  build:
    name: Build (when apps exist)
    runs-on: ubuntu-latest
    needs: [contract, test]
    if: false  # Enable when apps/web and apps/api are scaffolded
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "23"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build web
        run: npm run build --workspace=apps/web

      - name: Build api
        run: npm run build --workspace=apps/api
